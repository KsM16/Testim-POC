name: Testim Cloud Automation

 
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  execute-tests:
    runs-on: ubuntu-latest

    steps:
       
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      
      - name: Install Testim CLI
        run: npm install -g @testim/testim-cli

       
      - name: Run Testim Tests
        run: testim --token "${{ secrets.TESTIM_TOKEN }}" --project "${{ secrets.TESTIM_PROJECT_ID }}" --grid "Testim-HA-Grid" --name "Jewel_UI-Automation" --name "StableLocators" --name "SauceDemo_2" --name "Demo_2"
